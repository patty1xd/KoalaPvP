# ============================================================
#  KoalaPvP Configuration
#  Paper 1.21.1 - Deterministic Knockback System
# ============================================================

# Worlds where KoalaPvP knockback is active.
# Use '*' as a single entry to enable in ALL worlds.
enabled-worlds:
  - '*'

# ------------------------------------------------------------
#  KNOCKBACK VALUES
# ------------------------------------------------------------
knockback:

  # Ground hit knockback (victim standing on ground)
  ground:
    horizontal: 0.32   # Base horizontal force
    vertical:   0.30   # Base vertical lift
    friction:   2.4    # How quickly horizontal velocity fades

  # Air hit knockback (victim mid-air)
  air:
    horizontal: 0.28
    vertical:   0.27

  # Sprint bonus added to horizontal when attacker is sprinting
  sprint-bonus: 0.03

  # Knockback I enchantment multipliers
  enchant-kb1:
    horizontal-add: 0.50
    vertical-add:   0.10

  # Knockback II enchantment multipliers
  enchant-kb2:
    horizontal-add: 1.00
    vertical-add:   0.20

  # Attack cooldown scaling
  cooldown:
    enabled: true
    min-charge-threshold: 0.1   # Hits below this charge fraction are ignored
    scale-knockback: true        # Scale KB linearly with charge

  # Velocity smoothing: apply KB over N ticks
  # 1 = instant (classic), 2 = smooth over 2 ticks (recommended)
  smoothing-ticks: 2

  # Clamp Y velocity
  max-vertical-velocity: 0.55

  # Reset victim's existing velocity before applying new KB
  reset-existing-velocity: true

# ------------------------------------------------------------
#  HIT VALIDATION
# ------------------------------------------------------------
hit-validation:
  enabled: true

  # Maximum allowed distance (blocks) between attacker and victim
  max-range: 4.5

  # Lag compensation leniency
  lag-compensation: true
  lag-compensation-ms-per-block: 50   # 50ms ping = +1 block leniency
  lag-compensation-max-bonus: 2.0     # Never add more than 2 extra blocks

# ------------------------------------------------------------
#  ARMOR RULES
# ------------------------------------------------------------
armor:
  respect-netherite-resistance: true

# ------------------------------------------------------------
#  DEBUG
# ------------------------------------------------------------
debug:
  log-hits: false
  show-vectors: false

# ============================================================
#  KoalaPvP - KnockbackSync-style ping compensation
#  Paper 1.21.1
# ============================================================

# Worlds where KoalaPvP is active. '*' = all worlds.
enabled-worlds:
  - '*'

# ------------------------------------------------------------
#  PING COMPENSATION
#  This is the core feature. Vanilla KB is used as-is.
#  We only correct the ground-state desync caused by lag.
# ------------------------------------------------------------
ping-compensation:
  enabled: true

  # How many ms equals one tick of stale state (default 50 = one tick)
  ms-per-tick: 50

  # Maximum stale ticks to compensate (caps at this regardless of ping)
  max-stale-ticks: 8

  # If victim's state is stale by more than this many ticks, treat as airborne.
  # Prevents vertical KB being eaten when server thinks victim is grounded
  # but their client is already in the air.
  ground-trust-max-ticks: 1

# ------------------------------------------------------------
#  HIT VALIDATION
# ------------------------------------------------------------
hit-validation:
  enabled: true

  # XZ-only (horizontal) max distance in blocks
  max-range: 4.5

  # Add leniency based on attacker + victim ping
  lag-compensation: true
  lag-compensation-ms-per-block: 50
  lag-compensation-max-bonus: 2.0

# ------------------------------------------------------------
#  DEBUG
# ------------------------------------------------------------
debug:
  log-hits: false
